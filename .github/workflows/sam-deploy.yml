# sam-deploy.yml - repo-local reusable SAM deployment (interim)
name: SAM Deploy

on:
  workflow_call:
    inputs:
      github_environment:
        description: "GitHub Environment to run in (protected envs gate PRD deploys)"
        type: string
        required: true
      stack_name:
        description: "CloudFormation stack name"
        type: string
        required: true
      template_path:
        description: "Path to the SAM template"
        type: string
        default: "template.yaml"
      aws_region:
        description: "Target AWS region"
        type: string
        default: "us-west-2"
      role_arn:
        description: "IAM role ARN to assume via OIDC for the deployment"
        type: string
        required: true
      parameter_overrides:
        description: "Space-separated Key=Value pairs passed to sam deploy"
        type: string
        default: ""
      python_version:
        description: "Python runtime used by sam build"
        type: string
        default: "3.12"
      artifact_bucket:
        description: "Existing S3 bucket for SAM build artifacts. Empty = --resolve-s3"
        type: string
        default: ""
      tags:
        description: "Space-separated Key=Value stack tags (LZ tagging policy)"
        type: string
        default: ""

permissions:
  id-token: write      # OIDC federation to AWS
  contents: read

jobs:
  deploy:
    name: SAM deploy (${{ inputs.github_environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    timeout-minutes: 30  # [CẢI THIỆN] Tự động ngắt nếu vượt quá 30 phút, tránh treo pipeline
    concurrency:
      group: sam-deploy-${{ inputs.stack_name }}-${{ inputs.github_environment }}
      cancel-in-progress: false
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python ${{ inputs.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'   # [CẢI THIỆN] Cache các thư viện pip để build nhanh hơn

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Validate template
        run: |
          sam validate --lint \
            --template ${{ inputs.template_path }} \
            --region ${{ inputs.aws_region }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: SAM build
        run: |
          sam build \
            --template ${{ inputs.template_path }} \
            --cached     # [CẢI THIỆN] Tái sử dụng các artifact đã build trước đó nếu source code không đổi

      - name: SAM deploy
        env: # [CẢI THIỆN] Đưa tham số vào Environment Variables để an toàn hơn
          ARTIFACT_BUCKET: ${{ inputs.artifact_bucket }}
          TAGS: ${{ inputs.tags }}
          PARAMS: ${{ inputs.parameter_overrides }}
        run: |
          # [CẢI THIỆN] Sử dụng mảng (Array) trong Bash để quản lý các cờ động an toàn và gọn gàng hơn
          DEPLOY_ARGS=(
            --stack-name "${{ inputs.stack_name }}"
            --region "${{ inputs.aws_region }}"
            --capabilities CAPABILITY_NAMED_IAM
            --no-confirm-changeset
            --no-fail-on-empty-changeset
            --no-progressbar
          )

          if [ -n "$ARTIFACT_BUCKET" ]; then
            DEPLOY_ARGS+=(--s3-bucket "$ARTIFACT_BUCKET")
          else
            DEPLOY_ARGS+=(--resolve-s3)
          fi

          if [ -n "$TAGS" ]; then
            DEPLOY_ARGS+=(--tags $TAGS)
          fi

          if [ -n "$PARAMS" ]; then
            DEPLOY_ARGS+=(--parameter-overrides $PARAMS)
          fi

          # Thực thi lệnh
          sam deploy "${DEPLOY_ARGS[@]}"

      - name: Describe stack outputs
        if: success()    # [CẢI THIỆN] Chỉ in output ra khi deploy hoàn toàn thành công
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ inputs.stack_name }} \
            --region ${{ inputs.aws_region }} \
            --query "Stacks[0].Outputs" --output table