# .github/workflows/deploy.yml
# UAT: automatic on merge to develop. PRD: manual approval via the protected
# "prd" GitHub Environment (Settings > Environments > prd > Required reviewers).
#
# NOTE ON LZv2 (verified against tmwk-GDC/teamwork-aws-lzv2-workflows @v2.0.0):
# the repo provides Terraform deployment workflows (terraform-deployment.yml,
# terraform-plan/apply, ...) and Docker/ECS workflows only - there is NO
# reusable workflow for SAM/CloudFormation. Since the architecture review
# mandates SAM for this workload, deployment is implemented directly below
# with SAM + OIDC (same security posture: no static keys). The org-standard
# LZv2 security-scan.yml IS consumed - see ci.yml. Raised with the Architect
# team: either LZv2 adds a sam-deploy workflow, or this repo-local SAM job
# is the accepted pattern for serverless workloads.
name: Deploy

on:
  push:
    branches: [develop]        # -> UAT
  workflow_dispatch:            # -> PRD (manual trigger from main)
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [prd]

permissions:
  id-token: write               # OIDC to AWS - no long-lived keys in GitHub
  contents: read

jobs:
  # Reusable SAM workflow authored in LZv2 conventions - lives locally until
  # the PR to tmwk-GDC/teamwork-aws-lzv2-workflows is merged, then switch the
  # `uses:` to the tagged LZv2 reference.
  deploy-uat:
    if: github.ref_name == 'develop'
    uses: ./.github/workflows/sam-deploy.yml
    # after LZv2 merge: tmwk-GDC/teamwork-aws-lzv2-workflows/.github/workflows/sam-deploy.yml@vX.Y.Z
    with:
      github_environment: uat
      stack_name: salesforce-backup-uat
      role_arn: ${{ vars.AWS_DEPLOY_ROLE_UAT }}
      parameter_overrides: >-
        EnvironmentName=uat
        KMSKeyArn=${{ vars.KMS_KEY_ARN_UAT }}
        S3BucketArn=${{ vars.S3_BUCKET_ARN_UAT }}
        SalesforceUsername=${{ vars.SF_USERNAME_UAT }}
        SalesforceLoginUrl=${{ vars.SF_LOGIN_URL_UAT }}

  deploy-prd:
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prd'
    uses: ./.github/workflows/sam-deploy.yml
    # after LZv2 merge: tmwk-GDC/teamwork-aws-lzv2-workflows/.github/workflows/sam-deploy.yml@vX.Y.Z
    with:
      github_environment: prd    # protected environment = required reviewer gate
      stack_name: salesforce-backup-prd
      role_arn: ${{ vars.AWS_DEPLOY_ROLE_PRD }}
      parameter_overrides: >-
        EnvironmentName=prd
        KMSKeyArn=${{ vars.KMS_KEY_ARN_PRD }}
        S3BucketArn=${{ vars.S3_BUCKET_ARN_PRD }}
        SalesforceUsername=${{ vars.SF_USERNAME_PRD }}
        SalesforceLoginUrl=${{ vars.SF_LOGIN_URL_PRD }}
