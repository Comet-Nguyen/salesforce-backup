# .github/workflows/deploy.yml
#
# Thin caller: all deployment mechanics live in the reusable sam-deploy.yml,
# so switching to the org-standard LZv2 workflow later is a one-line change
# (replace the local `uses:` path with the tmwk-GDC reference + tag).
#
# VARIABLE SCOPE - IMPORTANT:
# A job that calls a reusable workflow cannot declare `environment:` (the
# environment is declared inside sam-deploy.yml). Expressions in `with:` are
# evaluated in the CALLER context, which has no environment selected, so
# environment-scoped variables resolve to an empty string here.
# => every variable below MUST be a REPOSITORY variable (with _UAT/_PRD suffix).
# The prd environment still enforces its required-reviewer gate, because
# sam-deploy.yml sets `environment: prd` on the job that actually deploys.
name: Deploy

on:
  push:
    branches: [develop]        # -> UAT
  workflow_dispatch:           # -> PRD (manual, from main only)
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [prd]

permissions:
  id-token: write              # OIDC to AWS - no long-lived keys in GitHub
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false    # never cancel an in-flight CloudFormation deploy

jobs:
  deploy-uat:
    name: Deploy UAT
    if: github.ref_name == 'develop'
    uses: ./.github/workflows/sam-deploy.yml
    # after LZv2 publishes it:
    #   tmwk-GDC/teamwork-aws-lzv2-workflows/.github/workflows/sam-deploy.yml@vX.Y.Z
    with:
      github_environment: uat
      stack_name: salesforce-backup-uat
      aws_region: ${{ vars.AWS_REGION_UAT }}
      artifact_bucket: ${{ vars.SAM_ARTIFACT_BUCKET_UAT }}
      role_arn: ${{ vars.AWS_DEPLOY_ROLE_UAT }}
      parameter_overrides: >-
        EnvironmentName=uat
        KMSKeyArn=${{ vars.KMS_KEY_ARN_UAT }}
        S3BucketArn=${{ vars.S3_BUCKET_ARN_UAT }}
        SalesforceUsername=${{ vars.SF_USERNAME_UAT }}
        SalesforceLoginUrl=${{ vars.SF_LOGIN_URL_UAT }}

  deploy-prd:
    name: Deploy PRD
    # Manual dispatch from main only; sam-deploy.yml adds the prd reviewer gate
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prd' && github.ref_name == 'main'
    uses: ./.github/workflows/sam-deploy.yml
    with:
      github_environment: prd
      stack_name: salesforce-backup-prd
      aws_region: ${{ vars.AWS_REGION_PRD }}
      artifact_bucket: ${{ vars.SAM_ARTIFACT_BUCKET_PRD }}
      role_arn: ${{ vars.AWS_DEPLOY_ROLE_PRD }}
      parameter_overrides: >-
        EnvironmentName=prd
        KMSKeyArn=${{ vars.KMS_KEY_ARN_PRD }}
        S3BucketArn=${{ vars.S3_BUCKET_ARN_PRD }}
        SalesforceUsername=${{ vars.SF_USERNAME_PRD }}
        SalesforceLoginUrl=${{ vars.SF_LOGIN_URL_PRD }}