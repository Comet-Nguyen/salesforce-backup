# sam-deploy.yml - repo-local reusable SAM deployment (interim)
#
# Per Architect decision: the org-level sam-deploy reusable workflow will be
# authored by the LZv2 team later (same pattern as Terraform: lint -> scan ->
# build -> deploy). Until then this repo-local workflow unblocks deployments;
# deploy.yml calls it via `uses: ./.github/workflows/sam-deploy.yml` and will
# switch to the LZv2 reference in a one-line change once published.
#
# PREREQUISITE - CI identity (one-time setup per account):
# The SSO permission-set roles used by humans (e.g. CloudOps in the GDC-PROD
# account) CANNOT be assumed by GitHub Actions - their trust policy only
# trusts the IAM Identity Center provider. CI needs a dedicated IAM role per
# account trusting GitHub's OIDC provider (token.actions.githubusercontent.com),
# with the sub condition pinned to this repo. Create it once using CloudOps
# access, then store its ARN in the GitHub Environment variable referenced by
# the caller (AWS_DEPLOY_ROLE_UAT / _PRD).
name: SAM Deploy

on:
  workflow_call:
    inputs:
      github_environment:
        description: "GitHub Environment to run in (protected envs gate PRD deploys)"
        type: string
        required: true
      stack_name:
        description: "CloudFormation stack name"
        type: string
        required: true
      template_path:
        description: "Path to the SAM template"
        type: string
        default: "template.yaml"
      aws_region:
        description: "Target AWS region"
        type: string
        default: "us-west-2"
      role_arn:
        description: "IAM role ARN to assume via OIDC for the deployment"
        type: string
        required: true
      parameter_overrides:
        description: "Space-separated Key=Value pairs passed to sam deploy"
        type: string
        default: ""
      python_version:
        description: "Python runtime used by sam build"
        type: string
        default: "3.12"
      artifact_bucket:
        description: "Existing S3 bucket for SAM build artifacts. Empty = --resolve-s3 (SAM-managed bucket; may be blocked by LZ SCP/naming policies)"
        type: string
        default: ""
      tags:
        description: "Space-separated Key=Value stack tags (LZ tagging policy)"
        type: string
        default: ""

permissions:
  id-token: write      # OIDC federation to AWS
  contents: read

jobs:
  deploy:
    name: SAM deploy (${{ inputs.github_environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    concurrency:
      group: sam-deploy-${{ inputs.stack_name }}-${{ inputs.github_environment }}
      cancel-in-progress: false      # never cancel a running CloudFormation deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true      # prebuilt binary - much faster than pip install

      # --lint runs cfn-lint locally: no AWS credentials required, which is
      # why this step can (and should) run before assuming the OIDC role -
      # a broken template fails fast without ever touching the account.
      - name: Validate template
        run: |
          sam validate --lint \
            --template ${{ inputs.template_path }} \
            --region ${{ inputs.aws_region }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: SAM build
        run: sam build --template ${{ inputs.template_path }}

      - name: SAM deploy
        run: |
          sam deploy \
            --stack-name ${{ inputs.stack_name }} \
            --region ${{ inputs.aws_region }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --no-progressbar \
            ${{ inputs.artifact_bucket != '' && format('--s3-bucket {0}', inputs.artifact_bucket) || '--resolve-s3' }} \
            ${{ inputs.tags != '' && format('--tags {0}', inputs.tags) || '' }} \
            ${{ inputs.parameter_overrides != '' && format('--parameter-overrides {0}', inputs.parameter_overrides) || '' }}

      - name: Describe stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ inputs.stack_name }} \
            --region ${{ inputs.aws_region }} \
            --query "Stacks[0].Outputs" --output table
