name: CI - Enhanced Security & Quality

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  template-validation:
    name: SAM validate + cfn-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: sam validate --lint
        run: sam validate --lint --template template.yaml --region us-west-2
      - name: cfn-lint (explicit)
        run: |
          pip install cfn-lint
          cfn-lint template.yaml

  code-quality:
    name: Lint & Test (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies & Ruff
        run: |
          pip install --upgrade pip
          if [ -f src/backup/requirements.txt ]; then 
            pip install -r src/backup/requirements.txt; 
          fi
          pip install ruff pytest

      # ==================== RUFF CACHE ====================
      - name: Cache Ruff
        uses: actions/cache@v4
        with:
          path: ~/.cache/ruff
          key: ruff-${{ runner.os }}-${{ hashFiles('**/*.py') }}
          restore-keys: |
            ruff-${{ runner.os }}-

      # ====================================================

      - name: Syntax check
        run: |
          python -m py_compile src/backup/salesforce_backup.py
          python -m py_compile src/rotation/rotation_function.py

      - name: Ruff Lint
        run: ruff check . --output-format=github

      - name: Ruff Format check
        run: ruff format --check .

      - name: Run Tests (pytest)
        run: |
          if [ -d tests ]; then 
            pytest; 
          else 
            echo "No tests/ directory yet - skipping"; 
          fi

  iac-security:
    name: Policy-as-Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Checkov
        run: pip install checkov
      - name: Scan Template with Checkov
        run: checkov -f template.yaml --framework cloudformation --soft-fail

  # ==================== SO D GUARD - REFINED WITH CFN-LINT ====================
  encrypt-only-guard:
    name: SoD guard - Backup role is encrypt-only (cfn-lint custom rules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cfn-lint
        run: pip install cfn-lint

      # Structure-aware guard via cfn-lint custom rule E9001
      # (.github/cfn-lint-rules/sod_backup_role.py). Catches wildcard grants
      # (s3:*, kms:*, s3:Get*) that a text grep would miss.
      # NOTE: --append-rules takes a DIRECTORY of Python rules, not file paths.
      - name: Run SoD Custom Rule (E9001)
        run: |
          echo "Running SoD (encrypt-only) guard for the backup role..."

          # Full lint with the custom rule appended; the verdict below keys on
          # E9001 only (other findings are template-validation's concern).
          # Pipeline exit code is tee's, so a nonzero cfn-lint won't kill the
          # step before we grep.
          cfn-lint template.yaml \
            --append-rules .github/cfn-lint-rules 2>&1 | tee /tmp/sod-output.txt

          if grep -q "E9001" /tmp/sod-output.txt; then
            echo "::error::SoD violation detected! Backup role must remain encrypt-only."
            exit 1
          fi

          echo "SoD guard passed: backup role is strictly encrypt-only."
  # ==========================================================================

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lzv2-security-scan:
    name: LZv2 Security Scan
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      security-events: write
      issues: write
    secrets: inherit
    with:
      python_lock_file: src/backup/requirements.txt
      # No docker inputs: the Dockerfile left the repo with the Step Functions
      # decision (kept locally as the Fargate exit plan). The local
      # security-scan.yml copy skips its docker jobs when dockerfile_path is
      # empty - propose the same conditional to the LZv2 team upstream.