name: CI - Enhanced Security & Quality

on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Architect requirement: "sam validate + cfn-lint, template validation"
  template-validation:
    name: SAM validate + cfn-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      # --lint runs cfn-lint internally and needs no AWS credentials
      - name: sam validate --lint
        run: sam validate --lint --template template.yaml --region us-west-2
      - name: cfn-lint (explicit, as required by the review)
        run: |
          pip install cfn-lint
          cfn-lint template.yaml

  code-quality:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if [ -f src/backup/requirements.txt ]; then pip install -r src/backup/requirements.txt; fi
          pip install flake8 pytest
      - name: Syntax check (both entry-point modules must import cleanly)
        run: |
          python -m py_compile src/backup/salesforce_backup.py
          python -m py_compile src/rotation/rotation_function.py
      - name: Run Linter (flake8)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      # pytest exits 5 ("no tests collected") on an empty repo and would fail
      # the build - only run it once a tests/ directory exists.
      - name: Run Tests (pytest)
        run: |
          if [ -d tests ]; then pytest; else echo "No tests/ directory yet - skipping"; fi

  iac-security:
    name: Policy-as-Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Checkov
        run: pip install checkov
      # soft-fail: informational only. The blocking SoD control is the
      # encrypt-only-guard job below, which is specific to this design.
      - name: Scan Template with Checkov
        run: checkov -f template.yaml --framework cloudformation --soft-fail

  # Blocking guard for the CISO SoD requirement: the backup role must never
  # regain read access to backup data. Matches Action list entries only.
  encrypt-only-guard:
    name: SoD guard - no read-back permissions in template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if template grants backup-data read access
        run: |
          if grep -nE '^\s*-\s*(s3:GetObject|s3:ListBucket)\s*$' template.yaml; then
            echo "::error::SoD violation: backup role must not read S3 backup data"; exit 1
          fi
          if grep -nE '^\s*-\s*kms:Decrypt\s*$' template.yaml; then
            echo "::error::SoD violation: backup role must not hold kms:Decrypt"; exit 1
          fi
          echo "SoD guard passed: role remains encrypt-only"

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lzv2-security-scan:
    name: LZv2 Security Scan
    # Local copy of the LZv2 workflow (org repo is not reachable from this
    # account). Switch to the org reference once the repo lives in tmwk-GDC:
    #   uses: tmwk-GDC/teamwork-aws-lzv2-workflows/.github/workflows/security-scan.yml@v2.0.0
    uses: ./.github/workflows/security-scan.yml
    # A called workflow can never hold MORE permission than its caller job,
    # so these must be granted here or its "create issue" steps fail with 403.
    permissions:
      contents: read
      security-events: write
      issues: write
    secrets: inherit
    with:
      python_lock_file: src/backup/requirements.txt
      dockerfile_path: src/backup/Dockerfile
      docker_context: src/backup
      docker_image_name: salesforce-backup